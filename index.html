<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URANIUM STORE</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body>

    <header class="top-bar">
        <div class="logo">URANIUM</div>
        <div class="header-right">
            <div id="device-tag" class="device-id">ID: Cargando...</div>
            <div class="cart-btn" onclick="openCart()">
                CARRITO (<span id="cart-qty">0</span>)
            </div>
        </div>
    </header>

    <div class="layout">
        <aside id="admin-sidebar" class="sidebar admin-side" style="display: none;">
            <p class="section-title">DASHBOARD ADMIN</p>
            <div class="admin-form">
                <input type="text" id="p-name" placeholder="Nombre (Ej: Netflix)">
                <input type="number" id="p-price" placeholder="Precio Venta (PV)">
                <input type="text" id="p-img" placeholder="Link Logo/Imagen">
                <textarea id="p-desc" placeholder="Descripción detallada"></textarea>
                <select id="p-cat">
                    <option value="Streaming">Streaming</option>
                    <option value="Combos">Combos</option>
                </select>
                <button onclick="uploadProduct()" class="btn-black">PUBLICAR PRODUCTO</button>
            </div>
        </aside>

        <aside class="sidebar filters-side">
            <p class="section-title">CATEGORÍAS</p>
            <button onclick="render('all')">TODO</button>
            <button onclick="render('Streaming')">STREAMING</button>
            <button onclick="render('Combos')">COMBOS</button>
        </aside>

        <main class="main-content">
            <div id="products-grid" class="grid"></div>
        </main>
    </div>

    <div id="modal-detail" class="modal">
        <div class="modal-box detail-box">
            <div id="detail-content"></div>
            <div class="modal-footer">
                <button onclick="closeModals()" class="btn-ghost">VOLVER</button>
                <button id="add-to-cart-btn" class="btn-black">AÑADIR AL CARRITO</button>
            </div>
        </div>
    </div>

    <div id="modal-cart" class="modal">
        <div class="modal-box">
            <h3>MI PEDIDO</h3>
            <div id="cart-items-list" class="cart-list"></div>
            <p class="cart-total">TOTAL: $<span id="total-val">0</span></p>
            <div class="modal-footer-stack">
                <input type="text" id="client-name" placeholder="Tu Nombre Completo">
                <button onclick="payNequi()" class="btn-nequi">PAGAR CON NEQUI</button>
                <button onclick="closeModals()" class="btn-ghost">SEGUIR VIENDO</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
