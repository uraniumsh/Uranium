<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URANIUM</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
</head>
<body>

    <nav class="navbar">
        <div class="logo">URANIUM</div>
        <div class="nav-right">
            <button id="admin-login-btn" class="btn-ghost">ADMIN</button>
            <div class="cart-status" id="cart-trigger">CARRITO (<span id="cart-qty">0</span>)</div>
        </div>
    </nav>

    <div id="admin-dashboard" class="dashboard" style="display: none;">
        <div class="dashboard-inner">
            <h3>NUEVO PRODUCTO</h3>
            <div class="form-grid">
                <input type="text" id="p-name" placeholder="Nombre del servicio">
                <input type="number" id="p-price" placeholder="Precio ($)">
                <input type="text" id="p-img" placeholder="URL de la imagen">
                <select id="p-cat">
                    <option value="Streaming">Streaming</option>
                    <option value="Combos">Combos</option>
                    <option value="Premium">Premium</option>
                </select>
                <button id="save-product" class="btn-dark">PUBLICAR</button>
                <button id="logout-btn" class="btn-ghost">SALIR</button>
            </div>
        </div>
    </div>

    <div class="main-wrapper">
        <aside class="filters">
            <p>CATEGORÍAS</p>
            <button onclick="renderProducts('all')">VER TODO</button>
            <button onclick="renderProducts('Streaming')">STREAMING</button>
            <button onclick="renderProducts('Combos')">COMBOS</button>
        </aside>

        <section class="store-front">
            <div id="products-grid" class="grid"></div>
        </section>
    </div>

    <div id="login-modal" class="modal">
        <div class="modal-box">
            <h4>ACCESO RESTRINGIDO</h4>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Password">
            <button id="do-login" class="btn-dark">ENTRAR</button>
            <button onclick="closeModal()" class="btn-ghost">CANCELAR</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
